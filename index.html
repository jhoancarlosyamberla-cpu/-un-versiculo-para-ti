<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Versículo para Ti</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card{
  background:white;
  width:90%;
  max-width:650px;
  padding:30px;
  border-radius:18px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
  text-align:center;
}
button{
  background:#2d6cdf;
  color:white;
  border:none;
  padding:14px 28px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}
#texto{margin-top:25px;font-size:22px;font-style:italic;line-height:1.6}
#ref{margin-top:12px;font-weight:bold}
#exp{margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<div class="card">
<h1>📖 Un Versículo para Ti</h1>
<p><strong>Gracias por dedicar unos segundos a leer la Palabra de Dios.</strong></p>
<button onclick="nuevo()">Leer un versículo</button>

<div id="texto"></div>
<div id="ref"></div>
<div id="exp"></div>
</div>

<script>
const versos=[
{text:"Porque de tal manera amó Dios al mundo, que ha dado a su Hijo unigénito, para que todo aquel que en él cree no se pierda, mas tenga vida eterna.",ref:"Juan 3:16",exp:"Dios te ama y quiere que conozcas a Jesucristo."},
{text:"Venid a mí todos los que estáis trabajados y cargados, y yo os haré descansar.",ref:"Mateo 11:28",exp:"Jesús te invita a acercarte a Él con tus cargas."},
{text:"Echando toda vuestra ansiedad sobre él, porque él tiene cuidado de vosotros.",ref:"1 Pedro 5:7",exp:"Puedes confiar a Dios todas tus preocupaciones."},
{text:"No temas, porque yo estoy contigo.",ref:"Isaías 41:10",exp:"Dios promete acompañarte en medio del miedo."},
{text:"Jehová es mi pastor; nada me faltará.",ref:"Salmo 23:1",exp:"Dios cuida de quienes confían en Él."},
{text:"La paz os dejo, mi paz os doy.",ref:"Juan 14:27",exp:"La paz de Jesús es distinta a la que ofrece el mundo."},
{text:"Dios es nuestro amparo y fortaleza.",ref:"Salmo 46:1",exp:"En los momentos difíciles puedes acudir a Dios."},
{text:"Fíate de Jehová de todo tu corazón.",ref:"Proverbios 3:5",exp:"Confía en Dios incluso cuando no entiendas todo."},
{text:"Esfuérzate y sé valiente.",ref:"Josué 1:9",exp:"Dios fortalece a quienes caminan con Él."},
{text:"Mas Dios muestra su amor para con nosotros.",ref:"Romanos 5:8",exp:"Jesús murió por amor a nosotros."},
{text:"Yo soy la luz del mundo.",ref:"Juan 8:12",exp:"Jesús quiere guiar tu vida."},
{text:"Cercano está Jehová a los quebrantados de corazón.",ref:"Salmo 34:18",exp:"Dios está cerca de quien sufre."},
{text:"Tú guardarás en completa paz a aquel cuyo pensamiento en ti persevera.",ref:"Isaías 26:3",exp:"La confianza en Dios trae paz."},
{text:"No te desampararé, ni te dejaré.",ref:"Hebreos 13:5",exp:"Dios permanece fiel."},
{text:"Por la misericordia de Jehová no hemos sido consumidos.",ref:"Lamentaciones 3:22-23",exp:"Cada día Dios ofrece una nueva oportunidad."},
{text:"Yo he venido para que tengan vida.",ref:"Juan 10:10",exp:"Jesús ofrece una vida con propósito."},
{text:"Mi socorro viene de Jehová.",ref:"Salmo 121:2",exp:"Dios es nuestro auxilio."},
{text:"Porque por gracia sois salvos por medio de la fe.",ref:"Efesios 2:8",exp:"La salvación es un regalo de Dios."},
{text:"He aquí, yo estoy a la puerta y llamo.",ref:"Apocalipsis 3:20",exp:"Jesús invita a abrirle el corazón."},
{text:"La dádiva de Dios es vida eterna en Cristo Jesús.",ref:"Romanos 6:23",exp:"La vida eterna se recibe por medio de Cristo."}
];

function nuevo(){
 const v=versos[Math.floor(Math.random()*versos.length)];
 texto.innerHTML="“"+v.text+"”";
 ref.textContent=v.ref;
 exp.innerHTML="<b>Reflexión</b><br><br>"+v.exp;
}
</script>
</body>
</html>
